<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Lab · Debug Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <div class="brand-title">Agent Lab</div>
            <div class="brand-sub">Raw Agent SDK · 全能力调试台</div>
          </div>
        </div>
        <div class="topbar-meta" id="serverMeta">
          <span class="chip chip-muted">连接中…</span>
        </div>
        <div class="topbar-actions">
          <label class="toggle">
            <input type="checkbox" id="autoRefresh" checked />
            <span>自动刷新</span>
          </label>
          <button type="button" class="btn btn-ghost" id="btnRefresh">刷新</button>
          <button type="button" class="btn btn-primary" id="btnScheduler">运行调度</button>
        </div>
      </header>

      <nav class="tabs" role="tablist" aria-label="主功能区">
        <button type="button" class="tab active" data-tab="play" role="tab" aria-selected="true">对话 Playground</button>
        <button type="button" class="tab" data-tab="ops" role="tab">会话与任务</button>
        <button type="button" class="tab" data-tab="teams" role="tab">Teams 拓扑</button>
        <button type="button" class="tab" data-tab="trace" role="tab">Trace 时间线</button>
        <button type="button" class="tab" data-tab="more" role="tab">审批 · 作业 · 工作区</button>
      </nav>

      <!-- Playground -->
      <section class="panel active" id="panel-play" role="tabpanel">
        <div class="play-layout">
          <aside class="play-sidebar card">
            <h3 class="card-title">会话</h3>
            <button type="button" class="btn btn-ghost btn-block" id="btnNewSession">＋ 新建（清空选择）</button>
            <div class="list-scroll" id="sessionListMini"></div>
            <div class="divider"></div>
            <label class="field">
              <span>模式</span>
              <select id="modeSelect">
                <option value="chat">Chat</option>
                <option value="task">Task</option>
              </select>
            </label>
            <label class="field">
              <span>Agent</span>
              <select id="agentSelect"></select>
            </label>
            <label class="toggle field-toggle">
              <input type="checkbox" id="useStream" />
              <span>流式输出 (SSE)</span>
            </label>
          </aside>
          <div class="play-main card">
            <div class="play-header">
              <h2 id="playTitle">选择或创建会话</h2>
              <p id="playMeta" class="muted"></p>
              <div class="play-toolbar">
                <button type="button" class="btn btn-secondary" id="btnRunSession" disabled>Run Session</button>
                <button type="button" class="btn btn-ghost" id="btnCancelSession" disabled>取消运行</button>
              </div>
            </div>
            <div class="messages" id="playMessages"></div>
            <div class="composer-bar">
              <textarea id="playInput" rows="2" placeholder="输入消息… Enter 发送，Shift+Enter 换行"></textarea>
              <button type="button" class="btn btn-primary" id="btnSend">发送</button>
            </div>
            <p id="playStatus" class="status-line"></p>
          </div>
        </div>
      </section>

      <!-- Ops -->
      <section class="panel" id="panel-ops" role="tabpanel" hidden>
        <div class="two-col">
          <div class="card">
            <div class="card-head">
              <h3>会话</h3>
              <span class="badge" id="countSessions">0</span>
            </div>
            <div class="list-scroll tall" id="listSessions"></div>
          </div>
          <div class="card">
            <div class="card-head">
              <h3>任务</h3>
              <span class="badge" id="countTasks">0</span>
            </div>
            <div class="list-scroll tall" id="listTasks"></div>
          </div>
        </div>
      </section>

      <!-- Teams -->
      <section class="panel" id="panel-teams" role="tabpanel" hidden>
        <div class="teams-hero card">
          <div>
            <h2>多 Agent 协作拓扑</h2>
            <p class="muted">节点 = 已注册 Agent；边 = 邮箱消息流向（最近 200 条）。Teammate 会话高亮为「后台队友」。</p>
          </div>
          <div class="teams-form">
            <input type="text" id="tmName" placeholder="teammate id，如 reviewer-1" />
            <input type="text" id="tmRole" placeholder="角色描述" />
            <textarea id="tmPrompt" rows="2" placeholder="启动提示词"></textarea>
            <button type="button" class="btn btn-primary" id="btnSpawnTeammate">创建 Teammate</button>
          </div>
        </div>
        <div class="card teams-board">
          <div class="card-head">
            <h3>拓扑图</h3>
            <button type="button" class="btn btn-ghost btn-sm" id="btnTeamsRefresh">重绘</button>
          </div>
          <div class="graph-wrap" id="teamGraph">
            <svg id="teamSvg" xmlns="http://www.w3.org/2000/svg" aria-label="Team graph"></svg>
          </div>
        </div>
        <div class="card">
          <div class="card-head">
            <h3>全局邮箱流</h3>
            <span class="muted">最新优先</span>
          </div>
          <div class="list-scroll tall" id="listMailAll"></div>
        </div>
      </section>

      <!-- Trace -->
      <section class="panel" id="panel-trace" role="tabpanel" hidden>
        <div class="card">
          <div class="card-head">
            <h3>Trace 时间线</h3>
            <select id="traceSessionSelect" class="select-wide"></select>
            <button type="button" class="btn btn-secondary" id="btnLoadTrace">加载</button>
          </div>
          <p class="muted small">来源：<code>stateDir/traces/&lt;sessionId&gt;/events.jsonl</code></p>
          <div class="trace-timeline" id="traceTimeline"></div>
        </div>
      </section>

      <!-- More -->
      <section class="panel" id="panel-more" role="tabpanel" hidden>
        <div class="three-col">
          <div class="card">
            <div class="card-head"><h3>审批</h3><span class="badge" id="countApprovals">0</span></div>
            <div class="list-scroll tall" id="listApprovals"></div>
          </div>
          <div class="card">
            <div class="card-head"><h3>后台作业</h3></div>
            <div class="list-scroll tall" id="listJobs"></div>
          </div>
          <div class="card">
            <div class="card-head"><h3>工作区</h3></div>
            <div class="list-scroll tall" id="listWorkspaces"></div>
          </div>
        </div>
        <div class="card mail-compose">
          <h3 class="card-title">发邮箱消息</h3>
          <div class="row-3">
            <label class="field"><span>From</span><select id="mailFrom"></select></label>
            <label class="field"><span>To</span><select id="mailTo"></select></label>
            <label class="field field-span"><span>内容</span><textarea id="mailBody" rows="2"></textarea></label>
          </div>
          <button type="button" class="btn btn-primary" id="btnSendMail">发送并触发调度</button>
        </div>
      </section>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
