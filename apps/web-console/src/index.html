<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Raw Agent Console</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Raw Agent SDK</p>
          <h1>Raw Agent Harness Console</h1>
          <p class="lede">
            A bare agent loop with chat sessions, tasks, tool approvals, teammates, and isolated workspaces.
          </p>
        </div>
        <div class="hero-actions">
          <button id="newSessionButton" class="secondary">New Session</button>
          <button id="schedulerButton">Run Scheduler</button>
          <button id="refreshButton" class="secondary">Refresh</button>
        </div>
      </header>

      <section class="composer card">
        <div class="composer-row">
          <select id="modeSelect">
            <option value="chat">Chat</option>
            <option value="task">Task</option>
          </select>
          <input type="text" id="chatInput" placeholder="Send a message or create a task..." />
          <button id="chatSend">Send</button>
        </div>
      </section>

      <main class="primary-grid">
        <section class="card tall-card">
          <div class="card-header">
            <h2>Sessions</h2>
            <span id="sessionCount">0</span>
          </div>
          <div id="sessions" class="list"></div>
        </section>

        <section class="card conversation-card">
          <div class="card-header">
            <div>
              <h2 id="conversationTitle">Conversation</h2>
              <p id="conversationMeta" class="subtle">Select a session to inspect messages.</p>
            </div>
          </div>
          <div id="sessionTask" class="session-task hidden"></div>
          <div id="messages" class="messages empty-state">No session selected.</div>
        </section>
      </main>

      <section class="secondary-grid">
        <section class="card">
          <div class="card-header">
            <h2>Tasks</h2>
            <span id="taskCount">0</span>
          </div>
          <div id="tasks" class="list"></div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Approvals</h2>
            <span id="approvalCount">0</span>
          </div>
          <div id="approvals" class="list"></div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Agents</h2>
          </div>
          <div id="agents" class="list"></div>
        </section>

        <section class="card">
          <div class="card-header">
            <h2>Workspaces</h2>
          </div>
          <div id="workspaces" class="list"></div>
        </section>
      </section>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
