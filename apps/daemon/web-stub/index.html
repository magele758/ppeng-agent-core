<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Lab · API 已就绪</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0f14;
        color: #c8d0d8;
      }
      .card {
        max-width: 32rem;
        padding: 1.75rem 1.5rem;
        border-radius: 12px;
        border: 1px solid #1e2a36;
        background: #111820;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        color: #e8eef4;
      }
      p {
        margin: 0.65rem 0;
        font-size: 0.95rem;
      }
      code {
        font-size: 0.85em;
        padding: 0.15em 0.4em;
        border-radius: 4px;
        background: #1a2430;
        color: #7dd3c0;
      }
      a.cta {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.65rem 1.1rem;
        border-radius: 8px;
        background: #0d3d35;
        color: #9ff0e0;
        text-decoration: none;
        font-weight: 600;
        border: 1px solid #1a6b5c;
      }
      a.cta:hover {
        background: #125a4d;
      }
      .muted {
        color: #7a8a99;
        font-size: 0.88rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>这是 Daemon 占位页（仅 API）</h1>
      <p>
        当前端口提供 <code>/api/*</code>，<strong>没有</strong>聊天界面。完整 <strong>Agent Lab</strong> 在 Next 前端（默认
        <code>http://127.0.0.1:13000</code>）。
      </p>
      <p class="muted">请先保持本机 daemon 在 <code>7070</code>（或你配置的端口）运行，再开前端。</p>
      <a class="cta" href="http://127.0.0.1:13000">打开 Agent Lab（:13000）</a>
      <p class="muted" style="margin-top: 1.25rem">
        终端执行：<code>npm run dev:web-console</code>（可选：<code>export DAEMON_PROXY_TARGET=http://127.0.0.1:7070</code>，默认即
        7070）
      </p>
    </div>
  </body>
</html>
