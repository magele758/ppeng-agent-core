# Example: multi-replica daemon + bundled PG/Redis/MinIO.
# helm upgrade -i ppeng ./chart -f values.yaml -f values-production-example.yaml
daemon:
  replicaCount: 3
  localCacheSizeLimit: "20Gi"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
  pdb:
    enabled: true
    minAvailable: 2
  env:
    RAW_AGENT_DEPLOYMENT_MODE: cloud
    RAW_AGENT_EVENT_BUFFER_PROVIDER: redis_postgres
    RAW_AGENT_SKILL_REGISTRY_PROVIDER: pg_redis
    RAW_AGENT_ASSET_STORAGE_PROVIDER: tiered
    RAW_AGENT_DISPATCH_LOCK_PROVIDER: redis

persistence:
  enabled: false

postgresql:
  enabled: true
  auth:
    postgresPassword: "<from-secret-manager>"

redis:
  enabled: true

minio:
  enabled: true
  rootPassword: "<from-secret-manager>"

secret:
  create: true
  rawAgentApiKey: "<from-secret-manager>"
