# Legacy top-level replicaCount applies to web when web.replicaCount is unset.
replicaCount: 1

image:
  daemon:
    repository: ppeng-agent-core/daemon
    tag: latest
    pullPolicy: IfNotPresent
  web:
    repository: ppeng-agent-core/web
    tag: latest
    pullPolicy: IfNotPresent

web:
  replicaCount: ""
  port: 13000
  env:
    DAEMON_PROXY_TARGET: http://ppeng-agent-core-daemon:7070
    NODE_ENV: production
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

daemon:
  replicaCount: 1
  port: 7070
  host: "0.0.0.0"
  localCacheDir: /cache
  localCacheSizeLimit: ""
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  pdb:
    enabled: false
    minAvailable: 2
  env:
    RAW_AGENT_STATE_DIR: /data/state
    RAW_AGENT_DAEMON_HOST: "0.0.0.0"
    RAW_AGENT_DAEMON_PORT: "7070"
    RAW_AGENT_TIERED_CACHE_DIR: /cache/tiered
    RAW_AGENT_S3_PREFIX: skills/
    RAW_AGENT_S3_REGION: us-east-1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Chart default matches historical single-PVC layout. Enable PG/Redis/MinIO for multi-replica cloud (see values-production-example.yaml).
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

postgresql:
  enabled: false
  image: postgres:16-alpine
  storageSize: 50Gi
  storageClass: ""
  auth:
    postgresPassword: change-me-postgres
    database: postgres

redis:
  enabled: false
  image: redis:7-alpine

minio:
  enabled: false
  image: minio/minio:latest
  rootUser: minioadmin
  rootPassword: change-me-minio
  storageSize: 200Gi
  storageClass: ""
  defaultBucket: ppeng-assets
  consolePort: 9001
  s3Port: 9000

secret:
  create: true

service:
  daemon:
    type: ClusterIP
    port: 7070
  web:
    type: ClusterIP
    port: 13000
