{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ppeng-agent-core.fullname" . }}-secret
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.secret.rawAgentApiKey }}
  RAW_AGENT_API_KEY: {{ .Values.secret.rawAgentApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.rawAgentModelName }}
  RAW_AGENT_MODEL_NAME: {{ .Values.secret.rawAgentModelName | quote }}
  {{- end }}
  {{- if .Values.secret.rawAgentBaseUrl }}
  RAW_AGENT_BASE_URL: {{ .Values.secret.rawAgentBaseUrl | quote }}
  {{- end }}
{{- end }}
