{{- if or .Values.postgresql.enabled .Values.redis.enabled .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ppeng-agent-core.fullname" . }}-runtime-env
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: >-
    postgresql://postgres:{{ .Values.postgresql.auth.postgresPassword }}@{{ include "ppeng-agent-core.postgresql.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  REDIS_URL: redis://{{ include "ppeng-agent-core.redis.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:6379
  {{- end }}
  {{- if .Values.minio.enabled }}
  RAW_AGENT_S3_ENDPOINT: http://{{ include "ppeng-agent-core.minio.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.minio.s3Port }}
  RAW_AGENT_S3_BUCKET: {{ .Values.minio.defaultBucket | quote }}
  RAW_AGENT_S3_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  RAW_AGENT_S3_SECRET_KEY: {{ .Values.minio.rootPassword | quote }}
  {{- end }}
{{- end }}
