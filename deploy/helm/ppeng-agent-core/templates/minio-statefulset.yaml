{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ppeng-agent-core.minio.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.minio.s3Port }}
      targetPort: s3
      name: s3
    - port: {{ .Values.minio.consolePort }}
      targetPort: console
      name: console
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ppeng-agent-core.minio.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: minio
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: {{ include "ppeng-agent-core.minio.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: minio
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: minio
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image | quote }}
          args:
            - server
            - /data
            - --console-address
            - :{{ .Values.minio.consolePort }}
          ports:
            - containerPort: {{ .Values.minio.s3Port }}
              name: s3
            - containerPort: {{ .Values.minio.consolePort }}
              name: console
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.minio.storageSize | quote }}
        {{- if .Values.minio.storageClass }}
        storageClassName: {{ .Values.minio.storageClass | quote }}
        {{- end }}
{{- end }}
